function debitSide(k){if(k==='queries'){side('Customer details','debitCustomerDetails');side('Card account Query','debitAccount');side('Card transaction log','debitTransactions');side('Card Activity Query','debitActivity');side('Card link query','debitLinks');side('Visa base','debitVisa');side('Master base','debitMaster');side('Sms enrollment','debitSms')}if(k==='card'){side('Card maintenance','debitMaintenance');side('Hot card','debitHot');side('Limit counter','debitLimit');side('Adding mag strip','debitMag')}if(k==='utilities')side('Reset pin retries','debitPin')}
function payrollSide(k){if(k==='queries'){side('Customer details','payrollCustomer');side('Card activity query','payrollCardActivity');side('Prepaid Activity card','payrollPrepaidActivity');side('PP Card transaction log','payrollTransactionLog');side('Released transaction','payrollReleased');side('Posted transaction','payrollPosted');side('Mini statement','payrollMini');side('Hold transaction','payrollHold');side('Sms enrollment','payrollSms')}if(k==='card'){side('Hot card','payrollHot');side('Limit counter','payrollLimit')}if(k==='utilities')side('Reset pin retries','payrollPin')}
function prepaidSide(k){if(k==='queries'){side('Customer details','prepaidCustomer');side('Card transaction log','prepaidCardTransaction');side('Card activity query','prepaidCardActivity');side('Prepaid Activity card','prepaidActivity');side('PP Card transaction log','prepaidPPLog');side('Released transaction','prepaidReleased');side('Posted transaction','prepaidPosted');side('Mini statement','prepaidMini');side('Hold transaction','prepaidHold');side('Sms enrollment','prepaidSms')}if(k==='card'){side('Card maintenance','prepaidMaintenance');side('Hot card','prepaidHot');side('Limit counter','prepaidLimit')}if(k==='utilities')side('Reset pin retries','prepaidPin')}
function note(){return '<div class="fake-note">Fake training data only - no real customer/card/bank data. Transactions and financial movements are displayed in organized tables.</div>'}
function cls(s){if(String(s).includes('Active')||String(s).includes('Approved')||String(s).includes('Released')||String(s).includes('Posted')||String(s).includes('Normal'))return'status-active';if(String(s).includes('Inactive')||String(s).includes('Declined')||String(s).includes('Hot')||String(s).includes('exceeded'))return'status-inactive';return'status-pending'}
function section(title,content){return `<div class="section"><div class="section-title">${title}</div><div class="records">${content||'<div class="record">No data found</div>'}</div></div>`}
function card(title,obj){let body='';Object.keys(obj).forEach(k=>{body+=`<div class="kv"><div class="k">${k}</div><div class="v">${obj[k]}</div></div>`});return `<div class="record"><div class="record-title">${title}</div>${body}</div>`}
function tableSection(title,headers,rows,noteText){return `<div class="table-section"><div class="table-section-title"><span>${title}</span><span class="table-note">${noteText||''}</span></div><div class="table-wrap"><table class="fin-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows||`<tr><td colspan="${headers.length}">No data found</td></tr>`}</tbody></table></div></div>`}
function amountClass(v){v=String(v);if(v.trim().startsWith('+'))return'amount-plus';if(v.trim().startsWith('-'))return'amount-minus';return'amount-normal'}
function transactionRows(group,token){return allTransactions.filter(x=>x.group===group&&(!token||x.token===token)).map(x=>`<tr><td>${x.token}</td><td>${x.merchant}</td><td>${x.terminal}</td><td>${x.merchantTerminal}</td><td>${x.location}</td><td class="amount-normal">${x.amount}</td><td>${x.balanceAfter}</td><td>${x.fee}</td><td>${x.date}</td><td>${x.time}</td><td>${x.ref}</td><td class="${cls(x.response)}">${x.response}</td><td>${x.auth}</td><td>${x.type}</td></tr>`).join('')}
function activityRows(data,token){return data.filter(x=>x.token===token).map(x=>`<tr><td>${x.date}</td><td>${x.desc}</td><td class="${amountClass(x.amount)}">${x.amount}</td><td>${x.source}</td><td class="amount-normal">${x.balance}</td></tr>`).join('')}
function financialSummary(c){return `<div class="financial-summary"><div class="summary-box"><div class="summary-title">Available Balance</div><div class="summary-value">${c.availableBalance}</div></div><div class="summary-box"><div class="summary-title">Available Ledger</div><div class="summary-value">${c.availableLedger}</div></div></div>`}
function tokenSearch(kind,token,fn){return `<div class="form-grid"><div class="field"><label>Token</label><input id="${kind}Token" value="${token||''}"></div><div class="field"><label>Action</label><button class="btn" onclick="${fn}(document.getElementById('${kind}Token').value.trim())">Search</button></div></div>`}
function transactionForm(group,token){return `<div class="section"><div class="section-title">Add manual transaction</div><div class="screen-content"><div class="form-grid"><div class="field"><label>Token</label><input id="newToken" value="${token||''}"></div><div class="field"><label>Merchant</label><input id="newMerchant" value="NEW MERCHANT DEMO"></div><div class="field"><label>Terminal</label><input id="newTerminal" value="POS-NEW-001"></div><div class="field"><label>Merchant Terminal</label><input id="newMerchantTerminal" value="MRC-NEW-001"></div><div class="field"><label>Location</label><input id="newLocation" value="Cairo"></div><div class="field"><label>Amount</label><input id="newAmount" value="100.00 EGP"></div><div class="field"><label>Balance After</label><input id="newBalance" value="0.00 EGP"></div><div class="field"><label>Fee</label><input id="newFee" value="0.00 EGP"></div><div class="field"><label>Date</label><input id="newDate" value="2026-05-07"></div><div class="field"><label>Time</label><input id="newTime" value="12:00:00"></div><div class="field"><label>Reference</label><input id="newRef" value="REF-MANUAL-001"></div><div class="field"><label>Response</label><select id="newResponse"><option>00 Approved</option><option>51 Declined</option><option>05 Declined</option><option>55 Declined</option></select><div class="select-hint">Click to choose response code</div></div><div class="field"><label>Auth Number</label><input id="newAuth" value="A00001"></div><div class="field"><label>Transaction Type</label><select id="newType"><option>POS Purchase</option><option>Online Purchase</option><option>Cash Withdrawal</option><option>Balance Inquiry</option><option>Fawry Service</option><option>Other Payment</option><option>Foreign Purchase</option></select><div class="select-hint">Click to choose transaction type</div></div><div class="field"><label>Action</label><button class="btn" onclick="addTransaction('${group}')">Add Transaction</button></div></div></div></div>`}
function addTransaction(group){allTransactions.push({group,token:newToken.value,merchant:newMerchant.value,terminal:newTerminal.value,merchantTerminal:newMerchantTerminal.value,location:newLocation.value,amount:newAmount.value,balanceAfter:newBalance.value,fee:newFee.value,date:newDate.value,time:newTime.value,ref:newRef.value,response:newResponse.value,auth:newAuth.value,type:newType.value});if(group==='debit')renderDebitTransactions(newToken.value);if(group==='payroll')renderPPLog(newToken.value);if(group==='prepaid')renderPrepaidPPLog(newToken.value)}
function showScreen(s){if(s==='debitCustomerDetails')renderDebitCustomerDetails('CUST-100245');if(s==='debitAccount')renderDebitAccount('0019-005-263180002');if(s==='debitTransactions')renderDebitTransactions('TK-7902458812');if(s==='debitActivity')renderDebitActivity('TK-7902458812');if(s==='debitLinks')renderDebitLinks('TK-7902458812');if(s==='debitVisa')renderRefundBase('Visa base');if(s==='debitMaster')renderRefundBase('Master base');if(s==='debitSms')renderDebitSms();if(s==='debitMaintenance')renderDebitMaintenance();if(s==='debitHot')renderHot('TK-7902458812','Debit');if(s==='debitLimit')renderLimit('TK-7902458812','Debit');if(s==='debitMag')renderMagStrip();if(s==='debitPin')renderPin('TK-7902459920');if(s==='payrollCustomer')renderPayrollCustomer('29901011234567');if(s==='payrollCardActivity')renderPayrollCardActivity('PP-TK-55017720');if(s==='payrollPrepaidActivity')renderPayrollPrepaidActivity('PP-TK-55017720');if(s==='payrollTransactionLog')renderPPLog('PP-TK-55017720');if(s==='payrollReleased')renderReleased('PP-TK-55017720');if(s==='payrollPosted')renderPosted('PP-TK-55017720');if(s==='payrollMini')renderMini('PP-TK-55017720');if(s==='payrollHold')renderHold('PP-TK-55017720');if(s==='payrollSms')renderPayrollSms('PP-TK-55017720');if(s==='payrollHot')renderHot('PP-TK-55017720','Payroll');if(s==='payrollLimit')renderLimit('PP-TK-55017720','Payroll');if(s==='payrollPin')renderPin('PP-TK-55017720');if(s==='prepaidCustomer')renderPrepaidCustomer('30104011234560');if(s==='prepaidCardTransaction')renderPrepaidCardTransaction('PRE-TK-88440012');if(s==='prepaidCardActivity')renderPrepaidCardActivity('PRE-TK-88440012');if(s==='prepaidActivity')renderPrepaidActivity('PRE-TK-88440012');if(s==='prepaidPPLog')renderPrepaidPPLog('PRE-TK-88440012');if(s==='prepaidReleased')renderReleased('PRE-TK-88440012');if(s==='prepaidPosted')renderPosted('PRE-TK-88440012');if(s==='prepaidMini')renderMini('PRE-TK-88440012');if(s==='prepaidHold')renderHold('PRE-TK-88440012');if(s==='prepaidSms')renderPrepaidSms('PRE-TK-88440012');if(s==='prepaidMaintenance')renderPrepaidMaintenance();if(s==='prepaidHot')renderHot('PRE-TK-88440012','Prepaid');if(s==='prepaidLimit')renderLimit('PRE-TK-88440012','Prepaid');if(s==='prepaidPin')renderPin('PRE-TK-88440012')}
function renderDebitCustomerDetails(id){screenTitle.textContent='Queries / Customer details';const content=debitCards.filter(c=>!id||c.customerId===id).map(c=>card(c.cardNo,{CustomerID:c.customerId,Customer:c.customerName,Token:c.token,Type:c.cardType,Branch:c.deliveryBranch,Account:c.linkedAccount,Phone:'01000000001',Status:`<span class="${cls(c.status)}">${c.status}</span>`})).join('');screenContent.innerHTML=note()+`<div class="form-grid"><div class="field"><label>Customer ID</label><input id="debitCustId" value="${id||''}"></div><div class="field"><label>Action</label><button class="btn" onclick="renderDebitCustomerDetails(document.getElementById('debitCustId').value.trim())">Search</button></div></div>`+section('Debit customer cards',content)}
function renderDebitAccount(acc){screenTitle.textContent='Queries / Card account Query';const content=debitCards.filter(c=>!acc||c.linkedAccount===acc).map(c=>card(c.cardNo,{Primary:c.linkedAccount,Token:c.token,Customer:c.customerName,Type:c.cardType})).join('');screenContent.innerHTML=note()+`<div class="form-grid"><div class="field"><label>Account Number</label><input id="debitAcc" value="${acc||''}"></div><div class="field"><label>Action</label><button class="btn" onclick="renderDebitAccount(document.getElementById('debitAcc').value.trim())">Search</button></div></div>`+section('Cards by account',content)}
function renderDebitTransactions(t){screenTitle.textContent='Queries / Card transaction log';screenContent.innerHTML=note()+tokenSearch('debitTx',t,'renderDebitTransactions')+transactionForm('debit',t)+tableSection('Debit card transaction log',['Token','Merchant','Terminal','Merchant Terminal','Location','Amount','Balance After','Fee','Date','Time','Reference','Response','Auth','Type'],transactionRows('debit',t),'Transactions section - formatted table')}
function renderDebitActivity(t){screenTitle.textContent='Queries / Card Activity Query';screenContent.innerHTML=note()+section('Card actions',card('Issue',{Token:t,Channel:'Branch',User:'BR.OP01',Date:'2026-04-10',Time:'10:10:22'})+card('Activation',{Token:t,Channel:'CS',User:'CS.AGENT02',Date:'2026-04-11',Time:'11:15:22'}))}
function renderDebitLinks(t){screenTitle.textContent='Queries / Card link query';const c=debitCards.find(x=>x.token===t)||debitCards[0];screenContent.innerHTML=note()+section('Linked accounts',card('Primary account',{Token:c.token,Account:c.linkedAccount,Currency:'EGP',Status:c.status}))}
function renderRefundBase(base){screenTitle.textContent='Queries / '+base;screenContent.innerHTML=note()+section('Refund data',card('Refund 1',{Base:base,Token:'TK-7902458812',Card:'5366 **** **** 1024',Merchant:'ONLINE REFUND DEMO',Amount:'250.00 EGP',Date:'2026-04-26',Reference:'RF-20260426-1002',Status:'Posted'}))}
function renderDebitSms(){screenTitle.textContent='Queries / Sms enrollment';screenContent.innerHTML=note()+section('SMS enrollment',debitCards.map(c=>card(c.customerName,{Token:c.token,Phone:'01000000001',SMS:c.sms,Note:'Customer should call from registered phone'})).join(''))}
function renderDebitMaintenance(){screenTitle.textContent='Card Management / Card maintenance';screenContent.innerHTML=note()+section('Card maintenance',debitCards.map(c=>card(c.cardNo,{Token:c.token,Customer:c.customerName,Type:c.cardType,Status:c.status,Branch:c.deliveryBranch})).join(''))}
function renderMagStrip(){screenTitle.textContent='Card Management / Adding mag strip';screenContent.innerHTML=note()+`<div class="fake-note">Travel instructions for USD debit card only - limited countries list.</div>`+section('Allowed countries',countries.map((c,i)=>card(c,{Token:'TK-6611123055','Card Type':'USD Debit Card','From Date':'2026-06-0'+(i%9+1),'To Date':'2026-06-'+(10+i),Status:'Allowed'})).join(''))}
function sectorAllowed(c){return systemBranchSelect.value==='001'?c.sector.includes('001'):c.sector.includes('999')}
function renderPayrollCustomer(nid){screenTitle.textContent='Queries / Customer details';let data=payrollCustomers.filter(c=>sectorAllowed(c));if(nid)data=data.filter(c=>c.nationalId===nid);const content=data.map(c=>card(c.customerName,{Employer:c.employer,EmployeeNo:c.employeeNo,CorporateCode:`<span class="link" onclick="renderPayrollCard('${c.token}')">${c.corpCode}</span>`,Mobile:c.mobile,NationalID:c.nationalId,Sector:c.sector})).join('');screenContent.innerHTML=note()+`<div class="fake-note">Payroll branches are unchanged: 001 private sector / 999 government sector.</div><div class="form-grid"><div class="field"><label>National ID</label><input id="payNid" value="${nid||''}"></div><div class="field"><label>Action</label><button class="btn" onclick="renderPayrollCustomer(document.getElementById('payNid').value.trim())">Search</button></div></div>`+section('Payroll customer details',content)}
function renderPayrollCard(token){const c=payrollCustomers.find(x=>x.token===token);screenTitle.textContent='Payroll card details';screenContent.innerHTML=note()+section('Card details',card(c.customerName,{Token:c.token,Card:c.cardNo,Employer:c.employer,EmployeeNo:c.employeeNo,CorporateCode:c.corpCode,Sector:c.sector,SMS:c.sms,Status:c.status}))+financialSummary(c)}
function renderPayrollCardActivity(t){screenTitle.textContent='Queries / Card activity query';screenContent.innerHTML=note()+tokenSearch('cardAct',t,'renderPayrollCardActivity')+section('Card actions',card('Issue',{Token:t,Channel:'Branch',Date:'2026-04-20',User:'BR.PAY01'})+card('Activation',{Token:t,Channel:'CS',Date:'2026-04-21',User:'CS.AGENT07'}))}
function renderPayrollPrepaidActivity(t){const c=payrollCustomers.find(x=>x.token===t)||payrollCustomers[0];screenTitle.textContent='Queries / Prepaid Activity card';screenContent.innerHTML=note()+tokenSearch('payAct',t,'renderPayrollPrepaidActivity')+tableSection('Payroll financial movements - Prepaid Activity card',['Date','Description','Amount','Source','Balance'],activityRows(payrollActivity,t),'Oldest top / newest bottom')+financialSummary(c)}
function renderPPLog(t){const c=payrollCustomers.find(x=>x.token===t)||payrollCustomers[0];screenTitle.textContent='Queries / PP Card transaction log';screenContent.innerHTML=note()+tokenSearch('ppLog',t,'renderPPLog')+transactionForm('payroll',t)+tableSection('Payroll PP card transactions',['Token','Merchant','Terminal','Merchant Terminal','Location','Amount','Balance After','Fee','Date','Time','Reference','Response','Auth','Type'],transactionRows('payroll',t),'Card usage transactions')+financialSummary(c)}
function renderReleased(t){screenTitle.textContent='Queries / Released transaction';screenContent.innerHTML=note()+tokenSearch('released',t,'renderReleased')+tableSection('Released financial movements',['Token','Amount','Hold Date','Release Date','Reference','Status'],`<tr><td>${t}</td><td class="amount-normal">300.00 EGP</td><td>2026-05-01</td><td>2026-05-15</td><td>REL-${t.slice(-4)}</td><td class="status-active">Released</td></tr>`,'Released / reversed holds')}
function renderPosted(t){screenTitle.textContent='Queries / Posted transaction';screenContent.innerHTML=note()+tokenSearch('posted',t,'renderPosted')+tableSection('Posted financial movements',['Token','Amount','Post Date','Reference','Type'],`<tr><td>${t}</td><td class="amount-normal">250.00 EGP</td><td>2026-05-05</td><td>PST-${t.slice(-4)}</td><td>POS Purchase</td></tr>`,'Posted transactions')}
function renderMini(t){screenTitle.textContent='Queries / Mini statement';screenContent.innerHTML=note()+tokenSearch('mini',t,'renderMini')+tableSection('Mini statement financial movements',['Token','Posting Date','Description','Ledger Before','Ledger After','Available Before','Available After'],`<tr><td>${t}</td><td>2026-05-06</td><td>CARD PURCHASE SETTLEMENT</td><td>3570.75</td><td>3250.75</td><td>3570.75</td><td>3250.75</td></tr><tr><td>${t}</td><td>2026-05-05</td><td>SYSTEM DEBIT</td><td>4000.00</td><td>3570.75</td><td>4000.00</td><td>3570.75</td></tr>`,'Newest posting view')}
function renderHold(t){screenTitle.textContent='Queries / Hold transaction';screenContent.innerHTML=note()+tokenSearch('hold',t,'renderHold')+`<div class="fake-note">Payroll/Prepaid hold period: 14 days. Accounts hold period: 12 days.</div>`+tableSection('Hold financial movements',['Token','Amount','Merchant','Hold Date','Drop Off Date','Reference'],`<tr><td>${t}</td><td class="amount-normal">300.00 EGP</td><td>ONLINE HOLD DEMO</td><td>2026-05-01</td><td>2026-05-15</td><td>HLD-${t.slice(-4)}</td></tr>`,'Pending holds')}
function renderPayrollSms(t){screenTitle.textContent='Queries / Sms enrollment';const content=payrollCustomers.filter(c=>!t||c.token===t).map(c=>card(c.customerName,{Token:c.token,Mobile:c.mobile,SMS:c.sms,Sector:c.sector})).join('');screenContent.innerHTML=note()+tokenSearch('paySms',t,'renderPayrollSms')+section('Sms enrollment',content)}
function renderPrepaidCustomer(nid){screenTitle.textContent='Queries / Customer details';let data=prepaidCustomers;if(nid)data=data.filter(c=>c.nationalId===nid);const content=data.map(c=>card(c.customerName,{Hyperlink:`<span class="link" onclick="renderPrepaidAllData('${c.customerName}')">Open all prepaid data</span>`,Copy:`<button class="copy-name" onclick="copyName('${c.customerName}')">Copy name</button>`,Mobile:c.mobile,NationalID:c.nationalId,CardType:c.cardType,Card:c.cardNo,Status:c.status})).join('');screenContent.innerHTML=note()+`<div class="fake-note">Prepaid uses the updated debit branch list.</div><div class="form-grid"><div class="field"><label>National ID</label><input id="prepaidNationalId" value="${nid||''}"></div><div class="field"><label>Action</label><button class="btn" onclick="renderPrepaidCustomer(document.getElementById('prepaidNationalId').value.trim())">Search</button></div></div>`+section('Prepaid customer details',content)}
function renderPrepaidAllData(name){screenTitle.textContent='Prepaid customer data list';const content=prepaidCustomers.map(c=>card(c.customerName,{Token:c.token,Card:c.cardNo,Type:c.cardType,Mobile:c.mobile,NationalID:c.nationalId,'Available Balance':c.availableBalance,'Available Ledger':c.availableLedger})).join('');screenContent.innerHTML=note()+`<div class="fake-note">Use browser Ctrl+F and search for: ${name}</div>`+section('All prepaid data',content)}
function renderPrepaidCardTransaction(t){screenTitle.textContent='Queries / Card transaction log';screenContent.innerHTML=note()+tokenSearch('preCardTx',t,'renderPrepaidCardTransaction')+transactionForm('prepaid',t)+tableSection('Prepaid card transaction log',['Token','Merchant','Terminal','Merchant Terminal','Location','Amount','Balance After','Fee','Date','Time','Reference','Response','Auth','Type'],transactionRows('prepaid',t),'Prepaid card usage transactions')}
function renderPrepaidActivity(t){const c=prepaidCustomers.find(x=>x.token===t)||prepaidCustomers[0];screenTitle.textContent='Queries / Prepaid Activity card';screenContent.innerHTML=note()+tokenSearch('preAct',t,'renderPrepaidActivity')+tableSection('Prepaid financial movements - Activity card',['Date','Description','Amount','Source','Balance'],activityRows(prepaidActivity,t),'Oldest top / newest bottom')+financialSummary(c)}
function renderPrepaidPPLog(t){const c=prepaidCustomers.find(x=>x.token===t)||prepaidCustomers[0];screenTitle.textContent='Queries / PP Card transaction log';screenContent.innerHTML=note()+tokenSearch('prePPLog',t,'renderPrepaidPPLog')+transactionForm('prepaid',t)+tableSection('Prepaid PP card transactions',['Token','Merchant','Terminal','Merchant Terminal','Location','Amount','Balance After','Fee','Date','Time','Reference','Response','Auth','Type'],transactionRows('prepaid',t),'Card usage transactions')+financialSummary(c)}
function renderPrepaidCardActivity(t){screenTitle.textContent='Queries / Card activity query';screenContent.innerHTML=note()+tokenSearch('preCardAct',t,'renderPrepaidCardActivity')+section('Card activity query',card('Issue',{Token:t,Channel:'Branch',Date:'2026-04-18',User:'BR.PRE01'})+card('Activation',{Token:t,Channel:'ATM',Date:'2026-04-19',User:'ATM'}))}
function renderPrepaidReleased(t){return renderReleased(t)}function renderPrepaidPosted(t){return renderPosted(t)}function renderPrepaidMini(t){return renderMini(t)}function renderPrepaidHold(t){return renderHold(t)}
function renderPrepaidSms(t){screenTitle.textContent='Queries / Sms enrollment';const content=prepaidCustomers.filter(c=>!t||c.token===t).map(c=>card(c.customerName,{Token:c.token,Mobile:c.mobile,SMS:c.sms,CardType:c.cardType,Note:'Mobile must start with 2 for ATM activation'})).join('');screenContent.innerHTML=note()+tokenSearch('preSms',t,'renderPrepaidSms')+`<div class="fake-note">For prepaid ATM activation, mobile should be registered correctly and prefixed with 2.</div>`+section('Sms enrollment',content)}
function renderPrepaidMaintenance(){screenTitle.textContent='Card Management / Card maintenance';screenContent.innerHTML=note()+section('Prepaid card maintenance',prepaidCustomers.map(c=>card(c.customerName,{Token:c.token,Card:c.cardNo,Type:c.cardType,Mobile:c.mobile,Status:c.status})).join(''))}
function renderHot(t,type){screenTitle.textContent='Card Management / Hot card';screenContent.innerHTML=note()+`<div class="fake-note danger">Critical action: confirm correct card before stopping.</div><div class="form-grid"><div class="field"><label>Token</label><input value="${t}"></div><div class="field"><label>Card Type</label><input value="${type}" readonly></div><div class="field"><label>Reason</label><select id="hotReason"><option>Lost</option><option>Stolen</option><option>CVV</option><option>Risk block - view only</option></select><div class="select-hint">اضغط هنا واختار سبب الإيقاف</div></div><div class="field"><label>Status</label><input value="Ready" readonly></div></div>`}
function renderLimit(t,type){screenTitle.textContent='Card Management / Limit counter';screenContent.innerHTML=note()+section('Limit counter',card(type,{Token:t,'Daily Count':'10','Daily Amount':'10,000 EGP','Monthly Count':'100','Monthly Amount':'75,000 EGP','Cap Limit':'30,000 EGP',Note:'Cash limit reduces Cap limit; remaining can be used as POS purchase.'}))}
function renderPin(t){screenTitle.textContent='Utilities / Reset pin retries';screenContent.innerHTML=note()+`<div class="form-grid"><div class="field"><label>Token</label><input value="${t}"></div><div class="field"><label>Calling from registered mobile</label><input value="Yes" readonly></div><div class="field"><label>PIN retries before</label><input value="3" readonly></div><div class="field"><label>PIN retries after</label><input value="0" readonly></div></div>`}
function copyName(n){navigator.clipboard&&navigator.clipboard.writeText(n)}
</script>
</body>
</html>
